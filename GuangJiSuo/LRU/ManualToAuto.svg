<svg width="300" height="340" xmlns="http://www.w3.org/2000/svg">
  <!-- 齿轮阴影效果 -->
  <filter id="gearShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.3)"/>
  </filter>

  <!-- 齿轮主体 -->
  <g transform="translate(150, 150)" filter="url(#gearShadow)">
    <!-- 齿轮内圈 -->
    <circle cx="0" cy="0" r="60" fill="#4a4a4a"/>
    <!-- 齿轮轴孔 -->
    <circle cx="0" cy="0" r="20" fill="#ffffff" stroke="#333" stroke-width="1"/>

    <!-- 齿轮齿（共16个齿，均匀分布） -->
    <g id="gearTooth">
      <rect x="-10" y="-90" width="20" height="30" rx="2" fill="#4a4a4a"/>
    </g>
    <use href="#gearTooth" transform="rotate(22.5)"/>
    <use href="#gearTooth" transform="rotate(45)"/>
    <use href="#gearTooth" transform="rotate(67.5)"/>
    <use href="#gearTooth" transform="rotate(90)"/>
    <use href="#gearTooth" transform="rotate(112.5)"/>
    <use href="#gearTooth" transform="rotate(135)"/>
    <use href="#gearTooth" transform="rotate(157.5)"/>
    <use href="#gearTooth" transform="rotate(180)"/>
    <use href="#gearTooth" transform="rotate(202.5)"/>
    <use href="#gearTooth" transform="rotate(225)"/>
    <use href="#gearTooth" transform="rotate(247.5)"/>
    <use href="#gearTooth" transform="rotate(270)"/>
    <use href="#gearTooth" transform="rotate(292.5)"/>
    <use href="#gearTooth" transform="rotate(315)"/>
    <use href="#gearTooth" transform="rotate(337.5)"/>
  </g>

  <!-- 下方文本：恢复自动 -->
  <text x="150" y="310" font-family="Arial, sans-serif" font-size="50"
        fill="#333333" text-anchor="middle" font-weight="500">恢复自动</text>
</svg>
