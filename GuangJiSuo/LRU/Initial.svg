<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<!-- 黄色警示边框（保持与原风格一致） -->
<circle cx="50" cy="50" r="45" fill="none" stroke="#FFCC00" stroke-width="6"/>
<!-- 蓝色初始化按钮主体（蓝色体现初始/配置属性） -->
<circle cx="50" cy="50" r="40" fill="#0066CC"/>
<!-- 白色Initial文字（适配7个字母调整字体大小，保持居中） -->
<text x="50" y="55" font-family="Arial, sans-serif" font-size="30" font-weight="900" text-anchor="middle" fill="white">INIT</text>
</svg>
