<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
<!-- 黄色警示边框（保持与急停按钮风格一致） -->
<circle cx="50" cy="50" r="45" fill="none" stroke="#FFCC00" stroke-width="6"/>
<!-- 绿色复位按钮主体（绿色通常表示复位/启动功能） -->
<circle cx="50" cy="50" r="40" fill="#00B300"/>
<!-- 白色RESET文字（适配5个字母调整字体大小） -->
<text x="50" y="56" font-family="Arial, sans-serif" font-size="30" font-weight="900" text-anchor="middle" fill="white">RESET</text>
</svg>
